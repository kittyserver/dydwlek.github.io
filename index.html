<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>키티서버</title>

<style>
/* ===== 배경 ===== */
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;
  color:#e9eefc;
  background:
    radial-gradient(circle at 20% 10%, rgba(80,120,255,0.18), transparent 42%),
    radial-gradient(circle at 80% 0%, rgba(255,200,80,0.14), transparent 40%),
    radial-gradient(900px 420px at 50% -220px, rgba(27,42,68,0.9), transparent 65%),
    #0b0f1a;
}

/* ===== 인트로 (깨짐 없는 contain + SKIP 정상) ===== */
.intro{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
  display:none;
}
.intro.show{ display:block; }

/* ✔ 이미지 확대 없이 전체 표시 */
.intro::before{
  content:"";
  position:absolute;
  inset:0;
  background:#000 url('intro.jpg.png') center/contain no-repeat;
  pointer-events:none; /* 클릭 가로채기 방지 */
}

/* ✔ 어둡게 집중도 */
.intro::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center,
      rgba(0,0,0,0.25),
      rgba(0,0,0,0.85));
  pointer-events:none;
}

/* 가운데 */
.intro-center{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  text-align:center;
  z-index:2;
}

.intro-title{
  font-weight:900;
  letter-spacing:.6px;
  font-size:22px;
  text-shadow:0 8px 24px rgba(0,0,0,.7);
}

/* ✔ SKIP 버튼 */
.intro-skip{
  position:relative;
  z-index:3;
  cursor:pointer;
  padding:12px 22px;
  border-radius:999px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(10,12,18,.55);
  color:#fff;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}
.intro-skip:hover{
  transform:translateY(-1px);
  background:rgba(20,24,40,.65);
}

/* 페이드 */
.fade-out{ animation:fadeOut .35s ease forwards; }
@keyframes fadeOut{ to{ opacity:0; visibility:hidden; } }

/* ===== 메인 ===== */
.wrap{max-width:960px;margin:0 auto;padding:28px}

.card{
  background:#121a2b;
  border:1px solid #22304f;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* 배너 */
.banner-wrap{
  position:relative;
  overflow:hidden;
  border-radius:14px;
  margin-bottom:18px;
  border:1px solid #22304f;
}
.banner-img{width:100%;display:block;}

.banner-shine{
  position:absolute;
  top:0;
  left:-40%;
  width:40%;
  height:100%;
  background:linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.35) 50%,
    rgba(255,255,255,0) 100%
  );
  transform:skewX(-20deg);
  animation:shineMove 3.5s infinite;
  pointer-events:none;
}
@keyframes shineMove{0%{left:-40%}100%{left:140%}}

/* 카드 */
.box{
  background:#0f1626;
  border:1px solid #22304f;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}
h2{margin:0 0 8px}
.list{margin:0;padding-left:18px}

.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
a.btn{
  padding:10px 14px;
  border-radius:12px;
  text-decoration:none;
  color:#e9eefc;
  border:1px solid #3a4f7a;
}
a.btn:hover{background:#1b2a44}

.footer{margin-top:18px;color:#93a4c7;font-size:12px}

@media (max-width:520px){
  .wrap{padding:18px}
}
</style>
</head>

<body>

<!-- 인트로 -->
<div id="intro" class="intro">
  <div class="intro-center">
    <div class="intro-title">키티서버</div>
    <button class="intro-skip" id="skipBtn">SKIP</button>
  </div>
</div>

<!-- 메인 -->
<div class="wrap">
<div class="card">

<div class="banner-wrap">
  <img src="banner_glow_open_fix.jpg" class="banner-img">
  <div class="banner-shine"></div>
</div>

<div class="box">
<h2>📢 공지</h2>
<ul class="list">
<li>3월 1일 ~ 8일 2차 오픈</li>
<li>디스코드 및 단톡 참여 후 접속</li>
<li>오대기: 3월 1일 18시~20시</li>
</ul>
</div>

<div class="box">
<h2>⬇️ 다운로드</h2>
<div class="btns">
<a class="btn" href="https://drive.google.com/file/d/1T-wStrkUTliUxCikulXoJo4ZmJS9AVVp/view" target="_blank">접속기 다운로드</a>
</div>
</div>

<div class="box">
<h2>💬 커뮤니티</h2>
<div class="btns">
<a class="btn" href="https://discord.gg/ecBhq6Y9" target="_blank">Discord</a>
<a class="btn" href="https://open.kakao.com/o/g7MGDzdi" target="_blank">카카오 단톡</a>
<a class="btn" href="https://t.me/kitty20262026" target="_blank">Telegram</a>
</div>
</div>

<div class="footer">© 키티서버</div>

</div>
</div>

<script>
const intro = document.getElementById('intro');
const skipBtn = document.getElementById('skipBtn');

function closeIntro(){
  intro.classList.add('fade-out');
  setTimeout(()=> intro.remove(), 400);
}

/* 매번 인트로 표시 */
intro.classList.add('show');

skipBtn.addEventListener('click', closeIntro);

window.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && document.getElementById('intro')) closeIntro();
});
</script>

</body>
</html>
